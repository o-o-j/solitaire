<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>일본어 솔리테어 - 객체 분리형 마스터판</title>
    <style>
        :root { 
            --bg: #89d358;           
            --energy-bg: #d1efbd;    
            --card: #ffffff; 
            --accent: #f1c40f; 
            --green: #2ecc71; 
            --red: #ff4757; 
            --gold: #ffd700; 
            --selected: #3498db; 
        }

        body { 
            background: var(--bg); margin: 0; padding: 10px; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            user-select: none; touch-action: manipulation; color: #333; overflow-x: hidden;
        }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1500; display: flex; align-items: center; justify-content: center; }
        .pop-box { background: white; padding: 25px; border-radius: 25px; text-align: center; width: 85%; max-width: 350px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        
        .header { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; gap: 5px; position: relative; }
        .stage-display { background: var(--accent); color: #333; font-weight: bold; padding: 4px 15px; border-radius: 20px; font-size: 0.85rem; border: 2px solid white; margin-bottom: -5px; z-index: 10; }
        .score-display { color: white; font-size: 2rem; font-weight: 900; }
        
        .energy-container { width: 220px; height: 12px; background: var(--energy-bg); border-radius: 10px; border: 2px solid white; overflow: hidden; }
        #energy-fill { width: 100%; height: 100%; background: var(--green); transition: width 0.4s ease; }

        .target-area { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 800px; }
        .target-slot { width: 105px; height: 110px; background: rgba(255,255,255,0.3); border: 2px dashed white; border-radius: 12px; position: relative; flex-shrink: 0; }
        .slot-label { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--accent); padding: 2px 6px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; border: 2px solid white; z-index: 5; white-space: nowrap; }
        .slot-count { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); color: white; font-size: 0.7rem; font-weight: bold; }

        .tableau { display: flex; gap: 8px; justify-content: center; width: 100%; max-width: 600px; min-height: 460px; margin-top: 15px; flex-wrap: wrap; }
        .column { width: 18%; min-width: 55px; position: relative; display: flex; flex-direction: column; align-items: center; }
        
        .card { 
            width: 55px; height: 80px; background: white; border-radius: 8px; 
            position: absolute; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.1); border: 1px solid #eee; 
            transition: transform 0.1s; z-index: 10; cursor: pointer;
        }
        
        .card.selected { border: 3px solid var(--selected) !important; transform: translateY(-5px) scale(1.05); z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        .k-txt { font-size: 0.9rem; font-weight: bold; pointer-events: none; text-align: center; }
        .h-txt { font-size: 0.6rem; font-weight: bold; color: #2980b9; pointer-events: none; text-align: center; margin-top: 2px; }
        .r-txt { font-size: 0.5rem; color: #7f8c8d; pointer-events: none; text-align: center; margin-top: 2px; }
        
        .target-slot .card { position: absolute !important; top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) scale(0.9) !important; border: 2px solid var(--gold); }
        .card-emoji { font-size: 1.8rem; pointer-events: none; }
        .card-mean { font-size: 0.7rem; font-weight: bold; color: #2ecc71; margin-top: 2px; pointer-events: none; }

        button { background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; font-size: 1.1rem; margin-top: 10px; cursor: pointer; }
        #toast { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; opacity: 0; z-index: 2000; transition: 0.3s; pointer-events: none; text-align: center; white-space: pre-wrap; line-height: 1.4; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="login-overlay" class="overlay">
        <div class="pop-box">
            <h2>일본어 솔리테어</h2>
            <p style="font-size: 0.85rem; color: #636e72;">닉네임을 입력하면 <b>기록과 오답노트</b>가 저장됩니다!</p>
            <input type="text" id="nick" placeholder="닉네임 입력" autocomplete="off" style="width:80%; padding:10px; border-radius:8px; border:1px solid #ddd; text-align:center; margin-bottom:12px;">
            <button onpointerdown="startGame()">게임 시작</button>
        </div>
    </div>

    <div id="gameover-overlay" class="overlay" style="display:none;">
    <div class="pop-box" style="max-height: 90vh; overflow-y: auto; width: 90%; max-width: 400px;">
        <h2 style="color:var(--red); margin-bottom: 20px;">게임 종료!</h2>
        <p>달성 스테이지: <span id="final-stage-val" style="font-weight:bold; color:var(--accent);">1 스테이지</span></p>
        <div style="font-size: 2rem; font-weight: bold; margin: 15px 0; color: #333;">
            <span id="final-score-val">0 점</span>
        </div>

        <div style="margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 10px; text-align: left; border: 1px solid #ddd;">
            <h3 style="margin-top:0; color:var(--red); font-size:16px; border-bottom: 2px solid var(--red); padding-bottom: 5px; margin-bottom: 10px;">✏️ 이번 판 오답 노트</h3>
            <div id="wrong-word-list" style="font-size: 14px; max-height: 200px; overflow-y: auto; line-height: 1.6; color: #444;">
                </div>
        </div>

        <button onpointerdown="restartGame()">다시 도전하기</button>
    </div>
</div>

    <div id="toast">메시지</div>

    <div class="header">

        <div class="energy-container"><div id="energy-fill"></div></div>

let nick = "";
// 💡 wrongWords와 usedWords를 {} 대신 []로 변경합니다.
let userData = { stage: 1, score: 0, energy: 100, wrongWords: [], usedWords: [] };
let sessionWrongLog = {};
let currentStageTotals = {};
let currentStageCount = {};
let selectedCard = null;

// 💡 (선택 사항) 콤보 시스템을 넣고 싶다면 여기에 변수를 하나 더 추가해 줍니다!
let currentCombo = 0;

function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function startGame() {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        let unlockUtterance = new SpeechSynthesisUtterance('');
        window.speechSynthesis.speak(unlockUtterance);
    }
    
    nick = document.getElementById('nick').value.trim();
    if(!nick) return alert("닉네임을 입력하세요!");
    
    let saved = localStorage.getItem('solitaire_' + nick);
    if(saved) {
        userData = JSON.parse(saved);
        showToast(`환영합니다, ${nick}님!\n${userData.stage} 스테이지부터 이어합니다.`);
    } else {
        // [수정 조치] 새 게임 시작 시 기존에 남아있던 유저 데이터를 초기화하여 충돌을 방지합니다.
        userData = { 
            stage: 1, 
            score: 0, 
            energy: 100, 
            wrongWords: {}, 
            usedWords: {} 
        };
        showToast(`환영합니다, ${nick}님!\n새로운 게임을 시작합니다.`);
    }
    
    document.getElementById('login-overlay').style.display = 'none';
    initStage();
}

function saveData() {
    localStorage.setItem('solitaire_' + nick, JSON.stringify(userData));
}

function initStage() {
    document.getElementById('st-num').innerText = userData.stage;
    const tArea = document.getElementById('target-area');
    const tab = document.getElementById('tableau');
    tArea.innerHTML = ''; tab.innerHTML = ''; selectedCard = null;
    
    sessionWrongLog = {};
    currentStageTotals = {};
    currentStageCount = {};
    let cards = [];
    
    let stageNum = userData.stage;
    
    // 1~20층은 Level 1 풀, 21~40층은 Level 2 풀... 식으로 자연스러운 진급 밸런스 설계
    let currentLvl = Math.min(5, Math.floor((stageNum - 1) / 20) + 1);

    // [규칙 1] 입문~기초(1~20층)는 3~5개 테마 / 기초 이후(21층~)부터는 4~6개 테마 동적 추출
    let minTopics = (stageNum <= 20) ? 3 : 4;
    let maxTopics = (stageNum <= 20) ? 5 : 6;
    let targetTopicCount = Math.floor(Math.random() * (maxTopics - minTopics + 1)) + minTopics;

    // 현재 레벨에 소속된 단어만 정밀 필터링
    let levelPool = VOCAB_DB.filter(w => w.lvl === currentLvl);
    let availableCats = [...new Set(levelPool.map(w => w.cat))].sort(() => Math.random() - 0.5);

    // 한 스테이지 안에서 중복을 원천 차단하기 위해 슬라이싱
    let stageTopics = availableCats.slice(0, targetTopicCount);

    stageTopics.forEach(cat => {
        // [규칙 2] 각 테마마다 낱말 카드는 5~15개 유동 배치 (예외 유연 제어 포함)
        let targetWordCount = Math.floor(Math.random() * 11) + 5; 
        
        let allCatWords = levelPool.filter(w => w.cat === cat).sort(() => Math.random() - 0.5);
        
        // 현재 디비에 등록된 단어수를 초과하지 않도록 락(Lock) 구현
        let finalWordCount = Math.min(targetWordCount, allCatWords.length);
        let selectedWords = allCatWords.slice(0, finalWordCount);

        currentStageCount[cat] = 0; 
        currentStageTotals[cat] = selectedWords.length;
        sessionWrongLog[cat] = [];
        
        // 화면에는 [L1] 태그 없는 완벽히 깨끗한 본래 카테고리명 표기
        const slot = document.createElement('div');
        slot.className = 'target-slot';
        slot.innerHTML = `<div class="slot-label">${cat}</div><div class="slot-count" id="c-${cat}">0 / ${selectedWords.length}</div>`;
        
        slot.onpointerdown = (e) => { e.preventDefault(); if(selectedCard) handleMove(cat, slot); };
        tArea.appendChild(slot);
        
        selectedWords.forEach(w => cards.push({...w}));
    });

    // 필드에 카드 무작위 셔플 후 배치
    cards.sort(() => Math.random() - 0.5).forEach((d, idx) => {
        const c = document.createElement('div');
        c.className = 'card';
        
        let txtHTML = `<div class="k-txt">${d.k}</div>`;
        if(d.k !== d.h) txtHTML += `<div class="h-txt">${d.h}</div>`;
        txtHTML += `<div class="r-txt">${d.r}</div>`;
        
        c.innerHTML = txtHTML;
        c.dataset.info = JSON.stringify(d);
        c.style.top = (Math.floor(idx/5) * 28) + "px";
        
        const selectFn = (e) => {
            e.preventDefault(); e.stopPropagation();
            if(selectedCard) selectedCard.classList.remove('selected');
            selectedCard = c; c.classList.add('selected');
            
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(d.h);
                utter.lang = 'ja-JP'; window.speechSynthesis.speak(utter);
            }
        };

        c.onpointerdown = selectFn;

        const colId = idx % 5;
        let col = document.getElementById(`col-${colId}`);
        if(!col) { 
            col = document.createElement('div'); 
            col.className = 'column'; 
            col.id = `col-${colId}`; 
            tab.appendChild(col); 
        }
        col.appendChild(c);
    });
    updateUI();
    saveData();
}
function handleMove(cat, slot) {
    if (!selectedCard) return;
    try {
        const data = JSON.parse(selectedCard.dataset.info);
        if (!data || !data.cat) return;

        if (data.cat === cat) {
            currentStageCount[cat]++;
            // 💡 [변경] 기존 userData.score += 100; 대신 콤보 보너스 적용
            currentCombo++; // 콤보 1 증가
            userData.score += 100 + (currentCombo * 10); // 기본 100점 + (콤보수 x 10점) 보너스
            showToast(`🎯 정답! ${currentCombo} 콤보! 🔥`);

            const previousColumn = selectedCard.parentElement;

            selectedCard.removeAttribute('style'); 
            selectedCard.classList.remove('selected');
            selectedCard.onpointerdown = null; 
            selectedCard.style.zIndex = currentStageCount[cat]; 
            slot.appendChild(selectedCard);
            
            selectedCard.innerHTML = `
                <div class="card-emoji">${data.i}</div>
                <div class="card-mean">${data.m}</div>
            `;
            selectedCard = null;

            if (previousColumn && previousColumn.classList.contains('column')) {
                realignColumn(previousColumn);
            }
            checkStageClear();
        } else {
            function handleWrongAnswer() {
                currentCombo = 0; // 💡 틀렸으므로 연속 정답 콤보 리셋!
                userData.energy -= 10;
                
                // 💡 오답 노트에 단어 기록하기 (중괄호 세미콜론 오타 수정 및 로직 병합)
                if (selectedCard && selectedCard.dataset.key) {
                    const wordKey = selectedCard.dataset.key;
                    const wordObj = VOCAB_DB.find(w => w.k === wordKey);
                    if (wordObj) {
                        // 이미 오답 노트에 있는 단어인지 확인 후 없으면 삽입
                        const isAlreadyAdded = userData.wrongWords.some(w => w.k === wordObj.k);
                        if (!isAlreadyAdded) {
                            userData.wrongWords.push(wordObj);
                        }
                    }
                }
            
                if (selectedCard) selectedCard.classList.remove('selected');
                selectedCard = null;
                showToast("정답이 아니에요! 😢");
            }
        }
    } catch (error) {
        console.error("오류 발생:", error);
        resetSelectionState();
    }
    updateUI();
    saveData();
}

function realignColumn(columnElement) {
    const remainingCards = columnElement.querySelectorAll('.card');
    remainingCards.forEach((card, index) => {
        card.style.top = (index * 28) + "px";
    });
}

function checkStageClear() {
    const isAllCleared = Object.keys(currentStageTotals).every(
        key => currentStageCount[key] >= currentStageTotals[key]
    );
    if (isAllCleared) {
        userData.energy = Math.min(100, userData.energy + 20); // 최대 100까지만 20 회복
        let clearedStage = userData.stage;
        userData.stage++;
        saveData();
        setTimeout(() => { 
            showToast(`🎉 ${clearedStage} 스테이지 클리어! 🎉\n다음 스테이지로 이동합니다.`); 
            initStage(); 
        }, 800);
    }
}

function handleWrongAnswer() {
    userData.energy -= 10;
    
    // 💡 선택된 카드의 정보를 오답 노트에 기록하는 로직 추가
    if (selectedCard && selectedCard.dataset.key) {
        const wordKey = selectedCard.dataset.key;
        const wordObj = VOCAB_DB.find(w => w.k === wordKey);
        if (wordObj) {
            // 이미 오답 노트에 있는 단어인지 확인 후 없으면 삽입
            const isAlreadyAdded = userData.wrongWords.some(w => w.k === wordObj.k);
            if (!isAlreadyAdded) {
                userData.wrongWords.push(wordObj);
            }
        }
    }

    if (selectedCard) selectedCard.classList.remove('selected');
    selectedCard = null;
    showToast("정답이 아니에요! 😢");
}

function resetSelectionState() {
    if (selectedCard) selectedCard.classList.remove('selected');
    selectedCard = null;
    showToast("선택이 초기화되었습니다.");
}

function updateUI() {
    document.getElementById('score').innerText = userData.score;
    document.getElementById('energy-fill').style.width = userData.energy + "%";
    for(let k in currentStageTotals) {
        const el = document.getElementById(`c-${k}`);
        if(el) el.innerText = `${currentStageCount[k]} / ${currentStageTotals[k]}`;
    }
    if(userData.energy <= 0) {
        document.getElementById('final-stage-val').innerText = userData.stage + " 스테이지";
        document.getElementById('final-score-val').innerText = userData.score + " 점";
        const listEl = document.getElementById('wrong-word-list');
        if (listEl) {
            if (userData.wrongWords.length === 0) {
                listEl.innerHTML = "<p style='color:#888; text-align:center; margin:10px 0;'>틀린 단어가 없습니다! 완벽해요! 👏</p>";
            } else {
                listEl.innerHTML = userData.wrongWords.map(w => 
                    `<div style="border-bottom: 1px dashed #ccc; padding: 6px 0; display: flex; align-items: center; gap: 6px;">
                        <span>${w.i}</span> <b>${w.k}</b> <span style="color:#666; font-size:12px;">(${w.h})</span> : <span>${w.m}</span>
                     </div>`
                ).join('');
            }
        }

        document.getElementById('gameover-overlay').style.display = 'flex';
        // (여기에 있던 초기화 및 saveData 코드는 restartGame이 실행될 때 처리하므로 삭제해도 안전합니다)
    }
}

function restartGame() {
    // 1. 데이터 초기화 및 저장
    userData.energy = 100; 
    userData.stage = 1; 
    userData.score = 0; 
    userData.wrongWords = []; 
    currentCombo = 0; // 💡 [여기에 한 줄 추가] 새 게임이므로 콤보도 리셋!

    saveData();
    
    // 2. 게임오버 창 숨기기
    document.getElementById('gameover-overlay').style.display = 'none';
    
    // 3. 1스테이지 다시 생성
    initStage(); 
    
    showToast("게임이 처음부터 다시 시작되었습니다! 🔥");
}
</script>
</body>
</html>
