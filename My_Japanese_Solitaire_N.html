<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>일본어 솔리테어🃏</title>
    <style>
        /* 수정된 CSS: 카드가 겹치지 않도록 수정 */
        :root { 
            --bg: #89d358; --energy-bg: #d1efbd; --card: #ffffff; 
            --accent: #f1c40f; --green: #2ecc71; --red: #ff4757; 
            --gold: #ffae00; --selected: #3498db; 
        }
        body { background: var(--bg); margin: 0; padding: 10px; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; user-select: none; touch-action: manipulation; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1500; display: flex; align-items: center; justify-content: center; }
        .pop-box { background: white; padding: 20px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; }
        
        #game-container { display: none; width: 100%; max-width: 600px; flex-direction: column; align-items: center; }
        
        /* 테이블 레이아웃: 카드들이 정상적으로 흐르도록 변경 */
        .tableau { 
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; 
            width: 100%; margin-top: 20px;
        }
        
        .card { 
            width: 70px; height: 100px; background: white; border-radius: 8px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.1); border: 1px solid #eee; 
            cursor: pointer; position: relative; /* absolute 제거 */
        }
        
        .k-txt { font-size: 0.9rem; font-weight: bold; }
        .card-mean { font-size: 0.7rem; color: #2ecc71; margin-top: 2px; }
    </style>
</head>
<body>
    <div id="login-overlay" class="overlay">
        <div class="pop-box">
            <h2>일본어 솔리테어🃏</h2>
            <input type="text" id="nick" placeholder="닉네임 입력">
            <button onclick="startGame()">게임 시작</button>
        </div>
    </div>

    <div id="game-container">
        <div class="tableau" id="tableau"></div>
    </div>

    <script>
        // ... (사용자님의 기존 스크립트 로직을 여기에 붙여넣으세요) ...
        // 만약 전체 코드가 길다면, 위 <style> 부분만 적용하고 나머지는 기존 파일 것을 그대로 두어도 됩니다.
        
        function startGame() {
            // ... (기존 시작 로직)
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            renderCards();
        }

        function renderCards() {
            const tableau = document.getElementById('tableau');
            tableau.innerHTML = '';
            // 예시 데이터 렌더링
            for(let i=0; i<10; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<span class="k-txt">단어</span><span class="card-mean">의미</span>`;
                tableau.appendChild(card);
            }
        }
    </script>
</body>
</html>
