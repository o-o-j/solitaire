<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>일본어 솔리테어🃏</title>
    <style>
        :root { --bg: #89d358; --card: #ffffff; --green: #2ecc71; }
        body { background: var(--bg); margin: 0; padding: 10px; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; user-select: none; touch-action: none; overflow-x: hidden; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .pop-box { background: white; padding: 25px; border-radius: 20px; text-align: center; width: 80%; max-width: 300px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        #game-container { display: none; width: 100%; max-width: 600px; flex-direction: column; align-items: center; }
        
        .tableau { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; width: 100%; min-height: 400px; margin-top: 20px; position: relative; }
        
        .card { 
            width: 80px; height: 110px; background: white; border-radius: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #ddd;
            touch-action: none; cursor: grab; transition: transform 0.2s;
        }
        
        .card.dragging { z-index: 1000; box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .k-txt { font-size: 1.2rem; font-weight: bold; }
        .cat-txt { font-size: 0.6rem; color: #7f8c8d; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="login-overlay" class="overlay">
        <div class="pop-box">
            <h2>일본어 솔리테어🃏</h2>
            <input type="text" id="nick" placeholder="닉네임 입력" style="width:90%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px;">
            <button onclick="startGame()" style="padding:10px 20px; background:var(--green); color:white; border:none; border-radius:5px;">게임 시작</button>
        </div>
    </div>

    <div id="game-container">
        <div class="tableau" id="tableau"></div>
    </div>

<script>
// 데이터
const VOCAB_DB = [
    { k: "こんにちは", m: "안녕하세요", cat: "인사" },
    { k: "ありがとう", m: "감사합니다", cat: "인사" },
    { k: "鉛筆", m: "연필", cat: "도구" },
    { k: "猿", m: "원숭이", cat: "동물" }
];

let dragData = { isDragging: false, activeCard: null, startX: 0, startY: 0 };

function startGame() {
    const nick = document.getElementById('nick').value;
    if(!nick) { alert("닉네임을 입력하세요!"); return; }
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('game-container').style.display = 'flex';
    initCards();
}

function initCards() {
    const container = document.getElementById('tableau');
    container.innerHTML = '';
    VOCAB_DB.forEach(v => {
        let card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<span class="cat-txt">${v.cat}</span><span class="k-txt">${v.k}</span><span style="font-size:0.7rem; color:#2ecc71;">${v.m}</span>`;
        
        card.addEventListener('pointerdown', handleMove);
        card.addEventListener('pointermove', handleMove);
        card.addEventListener('pointerup', handleMove);
        
        container.appendChild(card);
    });
}

function handleMove(e) {
    if (e.type === 'pointerdown') {
        dragData.activeCard = e.target.closest('.card');
        if (!dragData.activeCard) return;
        dragData.isDragging = true;
        dragData.startX = e.clientX;
        dragData.startY = e.clientY;
        dragData.activeCard.classList.add('dragging');
        dragData.activeCard.setPointerCapture(e.pointerId);
    } 
    else if (e.type === 'pointermove' && dragData.isDragging) {
        let dx = e.clientX - dragData.startX;
        let dy = e.clientY - dragData.startY;
        dragData.activeCard.style.transform = `translate(${dx}px, ${dy}px) scale(1.1)`;
    } 
    else if (e.type === 'pointerup') {
        if (!dragData.activeCard) return;
        dragData.activeCard.style.transform = '';
        dragData.activeCard.classList.remove('dragging');
        dragData.isDragging = false;
    }
}
</script>
</body>
</html>
