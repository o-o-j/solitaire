    setTimeout(() => t.classList.remove('show'), 2000);
}

function startGame() {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        let unlockUtterance = new SpeechSynthesisUtterance('');
        window.speechSynthesis.speak(unlockUtterance);
    }

    nick = document.getElementById('nick').value.trim();
    if(!nick) return alert("лӢүл„Өмһ„мқ„ мһ…л Ҙн•ҳм„ёмҡ”!");
    
    let saved = localStorage.getItem('solitaire_' + nick);
    if(saved) {
        userData = JSON.parse(saved);
        showToast(`нҷҳмҳҒн•©лӢҲлӢӨ, ${nick}лӢҳ!\n${userData.stage} мҠӨн…Ңмқҙм§Җл¶Җн„° мқҙм–ҙн•©лӢҲлӢӨ.`);
    } else {
        showToast(`нҷҳмҳҒн•©лӢҲлӢӨ, ${nick}лӢҳ!\nмғҲлЎңмҡҙ кІҢмһ„мқ„ мӢңмһ‘н•©лӢҲлӢӨ.`);
    }
    
    document.getElementById('login-overlay').style.display = 'none';
    initStage();
}

function saveData() {
    localStorage.setItem('solitaire_' + nick, JSON.stringify(userData));
}

function initStage() {
    document.getElementById('st-num').innerText = userData.stage;
    const tArea = document.getElementById('target-area');
    const tab = document.getElementById('tableau');
    tArea.innerHTML = ''; tab.innerHTML = ''; selectedCard = null;
    sessionWrongLog = {};
    let cards = [];
    
    let stageTopics = [];
    let wrongTopics = Object.keys(userData.wrongWords).filter(cat => userData.wrongWords[cat].length > 0);
    
    stageTopics = wrongTopics.slice(0, 3);
    
    let allTopics = Object.keys(MASTER_DB).sort(() => Math.random() - 0.5);
    for(let cat of allTopics) {
        if(stageTopics.length >= 3) break;
        if(!stageTopics.includes(cat)) stageTopics.push(cat);
    }

    stageTopics.forEach(cat => {
        let maxCards = Math.floor(Math.random() * 11) + 5;
        let wordsForCat = [];
        
        if(userData.wrongWords[cat]) {
            wordsForCat = [...userData.wrongWords[cat]];
            userData.wrongWords[cat] = []; 
        }
        
        if(!userData.usedWords[cat]) userData.usedWords[cat] = [];
        let unused = MASTER_DB[cat].filter(w => !userData.usedWords[cat].includes(w.m) && !wordsForCat.some(ww => ww.m === w.m));
        unused.sort(() => Math.random() - 0.5);
        
        let needed = maxCards - wordsForCat.length;
        if(needed > 0) wordsForCat = wordsForCat.concat(unused.slice(0, needed));
        
        if(wordsForCat.length < 5) {
            let extra = MASTER_DB[cat].filter(w => !wordsForCat.some(ww => ww.m === w.m)).slice(0, 5 - wordsForCat.length);
            wordsForCat = wordsForCat.concat(extra);
        }

        wordsForCat.forEach(w => {
            if(!userData.usedWords[cat].includes(w.m)) userData.usedWords[cat].push(w.m);
        });

        currentStageCount[cat] = 0; 
        currentStageTotals[cat] = wordsForCat.length;
        sessionWrongLog[cat] = [];
        
        const slot = document.createElement('div');
        slot.className = 'target-slot';
        slot.innerHTML = `<div class="slot-label">${cat}</div><div class="slot-count" id="c-${cat}">0 / ${wordsForCat.length}</div>`;
        
        slot.onpointerdown = (e) => { e.preventDefault(); if(selectedCard) handleMove(cat, slot); };
        tArea.appendChild(slot);
        
        wordsForCat.forEach(c => cards.push({...c, cat: cat}));
    });

    cards.sort(() => Math.random() - 0.5).forEach((d, idx) => {
        const c = document.createElement('div');
        c.className = 'card';
        
        let txtHTML = `<div class="k-txt">${d.k}</div>`;
        if(d.k !== d.h) txtHTML += `<div class="h-txt">${d.h}</div>`;
        txtHTML += `<div class="r-txt">${d.r}</div>`;
        
        c.innerHTML = txtHTML;
        c.dataset.info = JSON.stringify(d);
        c.style.top = (Math.floor(idx/5) * 28) + "px";
        
        const selectFn = (e) => {
            e.preventDefault(); e.stopPropagation();
            if(selectedCard) selectedCard.classList.remove('selected');
            selectedCard = c; c.classList.add('selected');
            
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(d.h);
                utter.lang = 'ja-JP'; window.speechSynthesis.speak(utter);
            }
        };

        c.onpointerdown = selectFn;

        const colId = idx % 5;
        let col = document.getElementById(`col-${colId}`);
        if(!col) { col = document.createElement('div'); col.className='column'; col.id=`col-${colId}`; tab.appendChild(col); }
        col.appendChild(c);
    });
    updateUI();
    saveData();
}

function handleMove(cat, slot) {
    const data = JSON.parse(selectedCard.dataset.info);
    if(data.cat === cat) {
        currentStageCount[cat]++;
        userData.score += 100;
        
        selectedCard.style.top = ''; 
        slot.appendChild(selectedCard);
        
        selectedCard.classList.remove('selected');
        selectedCard.onpointerdown = null;
        
        selectedCard.innerHTML = `<div class="card-emoji">${data.i}</div><div class="card-mean">${data.m}</div>`;
        selectedCard = null;
        
        if(Object.keys(currentStageTotals).every(k => currentStageCount[k] >= currentStageTotals[k])) {
            for(let k in sessionWrongLog) {
                if(sessionWrongLog[k].length > 0) {
                    if(!userData.wrongWords[k]) userData.wrongWords[k] = [];
                    sessionWrongLog[k].forEach(wrongCard => {
                        if(!userData.wrongWords[k].some(w => w.m === wrongCard.m)) userData.wrongWords[k].push(wrongCard);
                    });
                }
            }
            let clearedStage = userData.stage;
            userData.stage++;
            saveData();
            setTimeout(() => { showToast(`рҹҺү ${clearedStage} мҠӨн…Ңмқҙм§Җ нҒҙлҰ¬м–ҙ! рҹҺү\nлӢӨмқҢ мҠӨн…Ңмқҙм§ҖлЎң мқҙлҸҷн•©лӢҲлӢӨ.`); initStage(); }, 800);
        }
    } else {
        userData.energy -= 10;
        if(!sessionWrongLog[data.cat].some(w => w.m === data.m)) sessionWrongLog[data.cat].push(data); 
        if(selectedCard) selectedCard.classList.remove('selected');
        selectedCard = null;
        showToast("м •лӢөмқҙ м•„лӢҲм—җмҡ”! рҹҳў\n(нӢҖлҰ° л¬ём ңлҠ” лӢӨмқҢм—җ лӢӨмӢң лӮҳмҳөлӢҲлӢӨ)");
    }
    updateUI();
    saveData();
}

function updateUI() {
    document.getElementById('score').innerText = userData.score;
    document.getElementById('energy-fill').style.width = userData.energy + "%";
    for(let k in currentStageTotals) {
        const el = document.getElementById(`c-${k}`);
        if(el) el.innerText = `${currentStageCount[k]} / ${currentStageTotals[k]}`;
    }
    if(userData.energy <= 0) {
        document.getElementById('final-stage-val').innerText = userData.stage + " мҠӨн…Ңмқҙм§Җ";
        document.getElementById('final-score-val').innerText = userData.score + " м җ";
        document.getElementById('gameover-overlay').style.display = 'flex';
        userData.energy = 100; userData.stage = 1; userData.score = 0; saveData();
    }
}
</script>
